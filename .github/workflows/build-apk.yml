name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 安装 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 4. 显示 Flutter 版本（调试用）
      - name: Flutter version info
        run: flutter --version

      # 5. 获取依赖
      - name: Get Flutter dependencies
        run: flutter pub get

      # 6. 生成 App 图标（失败不阻断）
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons || echo "⚠️ Icon gen skipped"

      # 7. 代码分析（可选，失败不阻断构建）
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      # 8. 构建 APK（Release 版，使用 debug 签名）
      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      # 9. 同时构建 Debug 版（用于测试）
      - name: Build APK (Debug)
        run: flutter build apk --debug --no-tree-shake-icons

      # 10. 上传 APK 产物
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: activity-knowledge-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: activity-knowledge-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 10. 显示 APK 信息
      - name: APK build info
        run: |
          echo "========================================="
          echo "✅ APK 构建成功！"
          echo "========================================="
          ls -lh build/app/outputs/flutter-apk/
          echo ""
          echo "📦 Debug APK: app-debug.apk"
          echo "📦 Release APK: app-release.apk"
          echo ""
          echo "⬇️ 下载方式："
          echo "  GitHub Actions → 本次 Run → Artifacts → 点击下载"
          echo "========================================="

  # 可选：同时构建 Release 并自动创建 GitHub Release
  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: activity-knowledge-release-apk
          path: ./apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "活动知识库 App v1.0.${{ github.run_number }} (${{ steps.date.outputs.date }})"
          body: |
            ## 📱 活动报名 + 知识库共享 Android App
            
            ### 安装方式
            1. 下载下方的 `app-release.apk`
            2. 发送到 Android 手机（微信/邮件/USB 均可）
            3. 打开文件，允许"安装未知来源应用"
            4. 点击安装即可
            
            ### 功能包含
            - ✅ 活动广场（列表/详情/报名）
            - ✅ 知识库（浏览/发布/点赞）
            - ✅ 个人中心（登录/我的活动/我的内容）
            
            ### 注意
            > 当前版本使用 Mock 数据，需接入云开发后才有真实数据
          files: ./apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
