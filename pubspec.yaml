name: activity_knowledge_app
description: 活动报名 + 知识库共享 App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.2

  # 图片选择
  image_picker: ^1.0.7

  # 路由
  go_router: ^13.2.0

  # UI 组件
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

  # 时间处理
  intl: ^0.19.0

  # Toast 提示
  fluttertoast: ^8.2.4

  # 图标
  cupertino_icons: ^1.0.6

  # 腾讯云开发 HTTP 支持
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
